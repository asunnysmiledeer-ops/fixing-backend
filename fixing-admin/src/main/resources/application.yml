# FIX-ING Demo v0 · 应用配置
server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: fixing-backend
  data:
    redis:
      # Redis：令牌黑名单 + 看板缓存。地址/密码支持环境变量覆盖（部署到别的机器不用改包）
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  servlet:
    multipart:
      # 报修可传故障视频，上限放宽到 100MB（默认 1MB 会直接 413）
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    # 本地 MySQL；数据库名 fixing，建库建表脚本见 sql/schema.sql
    # 整串 URL 或单独的密码都可用环境变量覆盖 —— "下载即部署"的关键
    url: ${DB_URL:jdbc:mysql://localhost:3306/fixing?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    # 密码从环境变量 DB_PASSWORD 读取，没设置时用默认值（仅限本机开发库）。
    # 原则：真实密码永远不硬编码进代码库 —— 公开仓库尤其如此
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    # 【关键】下划线列名(ticket_no) ↔ Java 驼峰属性(ticketNo) 自动映射。
    # 不开这个开关，查询出来的对象属性全是 null —— 数据层最常见的暗雷。
    map-underscore-to-camel-case: true
    # 开发期把 MyBatis 执行的 SQL 打到控制台，方便学习/排错；上线要换成正经日志实现
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略：跟随数据库自增(AUTO_INCREMENT)，与建表 DDL 保持一致
      id-type: auto
      # 软删除全局配置（配合 BaseEntity 的 @TableLogic）：0=正常 1=已删除
      logic-not-delete-value: 0
      logic-delete-value: 1

logging:
  level:
    com.fixing: debug

# 业务自定义配置（前缀 fixing 与框架配置区分开）
fixing:
  # 报修图片/视频的本地存储目录（相对工作目录）；上线换 MinIO/OSS
  upload-dir: uploads
  # 按次收费标准（不在保工单完工时自动生成结算单；v0.5 迁入字典可后台配）
  charge:
    visit-fee: 200      # 上门费(元/次)
    labor-fee: 300      # 维修费默认标准(元/单，工程师完工时可改)
  jwt:
    # JWT 签名密钥：HMAC-SHA256 要求 ≥32 字节。
    # 生产环境必须用环境变量 JWT_SECRET 注入随机长串 —— 密钥泄露 = 任何人都能伪造任意身份的令牌
    secret: ${JWT_SECRET:fixing-demo-secret-change-me-in-production-0123456789}
    # 令牌有效期（小时），过期后需重新登录
    expire-hours: 12
