<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · FIX-ING</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔧</text></svg>">
<!--
  登录页：独立于主应用的一个轻页面。
  登录成功 → token 存 localStorage → 跳转 index.html；
  主应用每个请求都带上这个 token，401 时再被踢回这里。
-->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    /* 深色渐变背景把登录卡片衬出来 */
    background: linear-gradient(135deg, #1f2937 0%, #111827 60%, #0f2a4a 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .login-card {
    background: #fff; border-radius: 14px; padding: 36px 40px; width: 380px;
    box-shadow: 0 16px 48px rgba(0,0,0,.4);
  }
  .logo { text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 4px; }
  .slogan { text-align: center; color: #8b949e; font-size: 13px; margin-bottom: 26px; }
  label { display: block; font-size: 13px; color: #57606a; margin: 14px 0 6px; }
  input {
    width: 100%; padding: 10px 12px; border: 1px solid #d0d7de;
    border-radius: 8px; font-size: 14px;
  }
  input:focus { outline: 2px solid #2563eb33; border-color: #2563eb; }
  .btn-login {
    width: 100%; margin-top: 22px; padding: 11px; border: none; border-radius: 8px;
    background: #2563eb; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-login:hover { background: #1d4ed8; }
  .error { color: #dc2626; font-size: 13px; margin-top: 12px; min-height: 18px; text-align: center; }
  /* 演示账号快捷区：真实系统不会有，Demo 里方便切换三种角色演示 */
  .demo-hint { margin-top: 24px; padding-top: 16px; border-top: 1px dashed #e5e7eb; }
  .demo-hint p { font-size: 12px; color: #8b949e; margin-bottom: 8px; text-align: center; }
  .demo-accounts { display: flex; gap: 8px; }
  .demo-accounts button {
    flex: 1; padding: 8px 4px; font-size: 12px; border: 1px solid #d0d7de;
    border-radius: 8px; background: #f6f8fa; cursor: pointer;
  }
  .demo-accounts button:hover { background: #eaeef2; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">🔧 FIX-ING</div>
  <div class="slogan">通用设备维保平台 · Demo v0.2</div>

  <form id="loginForm">
    <label>用户名</label>
    <input id="username" autocomplete="username" required>
    <label>密码</label>
    <input id="password" type="password" autocomplete="current-password" required>
    <button type="submit" class="btn-login">登 录</button>
    <div class="error" id="errMsg"></div>
  </form>

  <div class="demo-hint">
    <p>演示账号一键填入（密码均为 123456）</p>
    <div class="demo-accounts">
      <button onclick="fill('hospital_it')">🏥 客户</button>
      <button onclick="fill('admin')">🗂 管理员</button>
      <button onclick="fill('engineer_zh')">🔧 工程师</button>
    </div>
  </div>
</div>

<script>
'use strict';

/** 演示快捷键：填入账号密码（只是填表单，仍走正常登录流程） */
function fill(username) {
  document.getElementById('username').value = username;
  document.getElementById('password').value = '123456';
  document.getElementById('loginForm').requestSubmit(); // 触发正常提交
}

document.getElementById('loginForm').onsubmit = async (ev) => {
  ev.preventDefault();
  const err = document.getElementById('errMsg');
  err.textContent = '';
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      }),
    });
    const json = await res.json();
    if (json.code !== 0) throw new Error(json.message);
    // 登录成功：token 放 localStorage（主应用的 api() 每次请求都会带上它）
    localStorage.setItem('fixing_token', json.data.token);
    location.href = '/index.html';
  } catch (e) {
    err.textContent = e.message; // 后端统一回"用户名或密码错误"，不泄露哪个错
  }
};
</script>
</body>
</html>
